name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Enable these as required status checks in:
# Settings → Branches → Branch protection rules → main
# Without branch protection, CI is advisory, not enforceable.

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node / TypeScript ────────────────────────────────────────────
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with: { node-version: "24", cache: "npm" }

      - name: npm ci
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Lint
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run lint --if-present

      - name: Typecheck
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: npm run typecheck --if-present

      - name: Test
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      - name: Build
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present

      - name: Dependency audit (npm)
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm audit --audit-level=high

      # ── Python ──────────────────────────────────────────────────────
      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install + audit (Python)
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f pyproject.toml ]   && pip install -e . 2>/dev/null || true
          pip-audit --strict

      - name: Lint + test (Python)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: |
          pip install ruff pytest --quiet || true
          ruff check . || true
          pytest -q    || true