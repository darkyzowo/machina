# ═══════════════════════════════════════════════════════════════════
# Machina Orchestrator Configuration v3.0
# ═══════════════════════════════════════════════════════════════════

version: "3.0.0"

# ── ASPIRATIONAL: Model Routing ───────────────────────────────────
# Not enforced in single-agent Claude Code sessions. Reserved for future
# multi-agent orchestration. Do not document as an active feature.
# model_routing:
#   strategic: claude-opus-4-8
#   execution: claude-sonnet-4-6
#   rapid: claude-haiku-4-5

# ── Internal profiles (tool install only — user-facing control is rigor dial) ─
profiles:
  lean:
    description: "Hackathons, repos < 50 files"
    tools_enabled:
      - superpowers
      - agent_browser
      - ci_gates
    tools_disabled:
      - claude_mem
      - graphify
      - spec_kit

  standard:
    description: "Multi-day projects"
    tools_enabled:
      - superpowers
      - agent_browser
      - spec_kit
      - ci_gates
    tools_disabled:
      - claude_mem
      - graphify

  full:
    description: "Production, repos > 500 files"
    tools_enabled:
      - superpowers
      - agent_browser
      - spec_kit
      - claude_mem
      - graphify
      - ci_gates

# ── CI Gates ─────────────────────────────────────────────────────
ci_gates:
  required:
    - command: "npm test"
      pass_condition: "zero failing tests"
    - command: "npm run typecheck"
      pass_condition: "zero TypeScript errors"
    - command: "npm run lint"
      pass_condition: "zero lint errors"
    - command: "npm run build"
      pass_condition: "production build exits 0"
  ui_gate:
    tool: agent-browser
    trigger: "any feature with a UI surface"

# ── Spec-Kit Sequence (rigor mode harness phases) ─────────────────
spec_kit_sequence:
  - command: "/speckit.constitution"
    phase: speckit_constitution
    description: "Establish project governing principles"
  - command: "/speckit.specify"
    phase: speckit_specify
    description: "Define requirements — blocks impl until spec.md exists"
  - command: "/security-spec"
    phase: security_spec
    description: "Abuse cases + trust boundaries — blocks impl until security.md exists"
  - command: "/speckit.plan"
    phase: speckit_plan
    description: "Architecture + layout checkpoint"
  - command: "/speckit.tasks"
    phase: speckit_tasks
    description: "Verifiable micro-tasks"

# ── Harness phases (mechanical — phase-gate.js) ─────────────────
harness_phases:
  - orient
  - speckit_constitution
  - speckit_specify
  - security_spec
  - speckit_plan
  - speckit_tasks
  - red
  - green
  - refactor
  - ci_gates
  - ux_gate
  - task_complete
